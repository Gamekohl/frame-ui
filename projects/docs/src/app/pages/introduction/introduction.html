<main class="mx-auto grid min-h-[calc(100vh-60px)] max-w-448 items-center overflow-hidden px-4 py-8 sm:px-6 xl:px-10">
  <div class="grid items-center gap-12 xl:grid-cols-[minmax(0,0.9fr)_minmax(40rem,1.1fr)]">
    <section
      animate.enter="slide-in-enter"
      style="--docs-enter-delay: 0ms"
      class="relative z-10"
    >
      <div class="relative max-w-4xl">
        <div class="flex items-center gap-2 mb-3">
          <img [ngSrc]="themeService.isDark() ? '/logo/128x128_dark.webp' : '/logo/128x128.webp'" width="32" height="32" />
          <h4 class="text-2xl font-semibold tracking-tight">FrameUI</h4>
        </div>
        <h1 class="max-w-4xl text-5xl font-semibold tracking-tight sm:text-6xl lg:text-7xl text-center xl:text-left">
          A customizable <span class="angular-color-gradient">Angular</span> component library built around modern primitives.
        </h1>

        <p class="mt-5 max-w-3xl text-lg leading-9 text-muted-foreground text-center xl:text-left">
          Forms, overlays, navigation, feedback, and much more. The components share one token system, so they fit together without extra
          styling glue.
        </p>

        <div class="mt-8 flex flex-wrap gap-3 justify-center xl:justify-start">
          <a frButton size="lg" appearance="outline" routerLink="/docs/installation">
            <span frButtonLabel>Get started</span>
          </a>
          <a frButton size="lg" routerLink="/docs/components">
            <span frButtonLabel>Browse components</span>
            <ng-icon name="tablerArrowRight" size="18" frButtonIcon />
          </a>
        </div>
      </div>
    </section>

    <div
      aria-hidden="true"
      animate.enter="slide-in-enter"
      class="relative hidden h-168 overflow-visible xl:block"
      style="--docs-enter-delay: 120ms"
    >
      <div class="absolute left-0 top-1/2 w-280 -translate-y-1/2">
        <app-showcase />
      </div>
    </div>
  </div>
</main>
