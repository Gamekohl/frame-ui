<header class="sticky top-0 z-40 border-b border-border bg-background/94 backdrop-blur-xs">
  <div class="mx-auto flex h-14 max-w-350 items-center gap-4 px-4 sm:px-6 xl:px-0">
    <a routerLink="/" class="cursor-pointer">
      <img alt="Logo" [ngSrc]="themeService.isDark() ? '/logo/1024x1024_dark.webp' : '/logo/1024x1024.webp'" width="24" height="24" />
    </a>
    <nav class="hidden items-center gap-5 text-sm font-semibold md:flex">
      <a
        class="docs-blueprint-meta text-muted-foreground hover:text-foreground"
        routerLink="/docs"
      >
        Docs
      </a>
      <a
        class="docs-blueprint-meta text-muted-foreground hover:text-foreground"
        routerLink="/docs/components"
      >
        Components
      </a>
      <!--<a class="text-muted-foreground hover:text-foreground flex items-center gap-2" routerLink="/docs/mcp">
        MCP
      </a>
      <a class="text-muted-foreground hover:text-foreground" routerLink="/docs/roadmap">
        Roadmap
      </a>
      <a class="text-muted-foreground hover:text-foreground flex items-center gap-2" routerLink="/docs/ai-composer">
        AI Composer
        <span frBadge>Alpha</span>
      </a>-->
    </nav>

    <div class="ml-auto flex items-center gap-2">
      <button
        (click)="openSearch()"
        class="hidden min-w-54 justify-between! gap-8 text-muted-foreground sm:inline-flex"
        frButton
        appearance="outline"
        size="sm"
        type="button"
        data-testid="docs-search-trigger"
        aria-label="Search documentation"
      >
        <div>
          <span class="flex items-center gap-2">
          <ng-icon name="tablerSearch" size="16" frButtonIcon />
          Search docs...
        </span>
        </div>
        <kbd class="border border-border bg-muted px-1.5 py-0.5 text-[0.68rem] font-semibold text-muted-foreground">
          Alt P
        </kbd>
      </button>

      <button
        (click)="toggleTheme()"
        frIconButton
        appearance="outline"
        size="sm"
        aria-label="Toggle theme"
        type="button"
        title="Toggle Theme"
      >
        <ng-icon name="tablerSunMoon" size="18" frButtonIcon />
      </button>

      <div frSeparator orientation="vertical"></div>

      <a
        href="https://github.com/gamekohl/frame-ui"
        target="_blank"
        frIconButton
        appearance="outline"
        size="sm"
        aria-label="GitHub"
        type="button"
        title="GitHub"
      >
        <ng-icon name="tablerBrandGithub" size="18" frButtonIcon />
      </a>
    </div>
  </div>
</header>

<ng-template #searchDialog="frCommandDialog" frCommandDialog aria-label="Search documentation">
  <section frCommand closeOnSelect (itemSelected)="navigateTo($event)" aria-label="Search documentation">
    <input frCommandInput placeholder="Search pages and components..." />

    <div frCommandList>
      <p frCommandEmpty>No matching page or component found.</p>

      <div frCommandGroup heading="Pages">
        <p frCommandGroupHeading>Pages</p>

        @for (page of pages; track page.path) {
          <button frCommandItem [value]="page.path" [label]="page.title" [keywords]="page.keywords">
            <ng-icon name="tablerFileText" size="17" frCommandItemIcon />
            <span>{{ page.title }}</span>
            <span frCommandShortcut>{{ page.section }}</span>
          </button>
        }
      </div>

      <div frCommandSeparator></div>

      <div frCommandGroup heading="Tools">
        <p frCommandGroupHeading>Tools</p>

        @for (page of tools; track page.path) {
          <button frCommandItem [value]="page.path" [label]="page.title" [keywords]="page.keywords">
            <ng-icon name="tablerTools" size="17" frCommandItemIcon />
            <span>{{ page.title }}</span>
            <span frCommandShortcut>{{ page.section }}</span>
          </button>
        }
      </div>

      <div frCommandSeparator></div>

      <div frCommandGroup heading="Components">
        <p frCommandGroupHeading>Components</p>

        @for (component of components(); track component.slug) {
          <button
            frCommandItem
            [value]="'/docs/components/' + component.slug"
            [label]="component.name"
            [keywords]="componentKeywords(component)"
          >
            <ng-icon name="tablerComponents" size="17" frCommandItemIcon />
            <span>{{ component.name }}</span>
            <span frCommandShortcut>{{ component.category }}</span>
          </button>
        }
      </div>
    </div>

    <div frCommandFooter>

      <span><kbd>↑↓</kbd> to navigate</span>

      <span><kbd>↵</kbd> to select</span>

      <span><kbd>esc</kbd> to close</span>

    </div>
  </section>
</ng-template>
