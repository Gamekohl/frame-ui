<div frSidebarProvider class="h-screen max-h-screen overflow-hidden">
 <aside frSidebar class="max-h-full overflow-hidden" style="--frame-sidebar-bg: #fafafa">
 <div frSidebarHeader>
 <a frSidebarMenuButton size="lg" href="#">
 <ng-icon name="tablerRocket" size="18" />
 <span>DeployOps</span>
 </a>
 </div>

 <div frSidebarContent class="px-4!">
 <ul class="flex-1">
 @for (item of navItems; track item.label) {
 <li frSidebarMenuItem>
 @if (item.route) {
 <a
 frSidebarMenuButton
 [routerLink]="item.route"
 routerLinkActive
 #link="routerLinkActive"
 [active]="link.isActive"
 [routerLinkActiveOptions]="{ exact: true }"
 >
 <ng-icon [name]="item.icon" size="17" />
 <span>{{ item.label }}</span>
 </a>
 } @else {
 <a frSidebarMenuButton href="#">
 <ng-icon [name]="item.icon" size="17" />
 <span>{{ item.label }}</span>
 </a>
 }
 </li>
 }
 </ul>
 <div frField>
 <label frFieldLabel for="project"
 class="uppercase text-xs! text-muted-foreground! tracking-wide">Project</label>

 <div frFieldContent>
 <button id="project" [frSelect]="deploymentMenu" [formControl]="deploymentControl" indicatorPosition="end"
 type="button">
 <span frSelectValue placeholder="Choose a deployment"></span>
 <span frSelectIcon>
 <ng-icon name="tablerChevronDown" size="16" />
 </span>
 </button>

 <ng-template #deploymentMenu="frSelectContent" frSelectContent>
 <div frSelectPanel>
 <div frSelectGroup>
 <button frSelectItem value="production" label="Production">
 <span>Production</span>
 </button>
 <button frSelectItem value="staging" label="Staging">
 <span>Staging</span>
 </button>
 <button frSelectItem value="development" label="Development">
 <span>Development</span>
 </button>
 </div>
 </div>
 </ng-template>
 </div>
 </div>
 </div>

 <div frSidebarFooter>
 <div frDropdownMenu>
 <div [frDropdownMenuTrigger]="userMenu" class="flex items-center px-4 py-2 cursor-pointer">
 <span frAvatar size="sm">
 <img frAvatarImage src="https://i.pravatar.cc/300?u=alex.morgan@acme.io" alt="Avatar" />
 </span>
 <div class="ml-2">
 <p class="text-sm font-medium">Alex Morgan</p>
 <p class="text-xs text-muted-foreground">alex.morgan&#64;acme.io</p>
 </div>
 <ng-icon name="tablerChevronDown" size="16" class="ml-auto text-muted-foreground" />
 </div>

 <ng-template #userMenu="frDropdownMenuContent" frDropdownMenuContent side="right">
 <div frDropdownMenuPanel>
 <button frDropdownMenuItem type="button">
 <ng-icon name="tablerSettings" size="14" />
 <span>Settings</span>
 </button>
 <div frDropdownMenuSeparator></div>
 <button frDropdownMenuItem type="button">
 <ng-icon name="tablerLogout" size="14" />
 <span>Sign out</span>
 </button>
 </div>
 </ng-template>
 </div>
 </div>
 <div frSidebarRail></div>
 </aside>

 <main frSidebarInset>
  <router-outlet />
 </main>
</div>

<ng-template #toastCloseIcon>
 <ng-icon name="tablerX" />
</ng-template>

<frame-toast-viewport [closeIcon]="toastCloseIcon" />
